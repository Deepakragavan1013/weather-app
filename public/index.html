<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />

    <!-- App Icon — weather emoji as favicon -->
    <link rel="icon" href="%PUBLIC_URL%/favicon.ico" />
    <link rel="apple-touch-icon" href="%PUBLIC_URL%/logo192.png" />
    <link rel="manifest" href="%PUBLIC_URL%/manifest.json" />

    <!-- Viewport & Theme -->
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#302b63" />

    <!-- Primary Meta -->
    <title>Skye Weather — Live Weather App</title>
    <meta name="description" content="Get real-time weather updates for any city in the world. Search by city, view 5-day forecast, humidity, wind speed and more." />
    <meta name="keywords" content="weather, forecast, temperature, humidity, wind, rain, live weather" />
    <meta name="author" content="Skye Weather App" />

    <!-- Open Graph — shows when you share the link on WhatsApp, Facebook etc -->
    <meta property="og:title" content="Skye Weather — Live Weather App" />
    <meta property="og:description" content="Real-time weather for any city. 5-day forecast, humidity, wind and more." />
    <meta property="og:type" content="website" />
    <meta property="og:image" content="%PUBLIC_URL%/logo512.png" />

    <!-- Twitter Card — shows when you share on Twitter/X -->
    <meta name="twitter:card" content="summary" />
    <meta name="twitter:title" content="Skye Weather — Live Weather App" />
    <meta name="twitter:description" content="Real-time weather for any city. 5-day forecast, humidity, wind and more." />
    <meta name="twitter:image" content="%PUBLIC_URL%/logo512.png" />
  </head>
  <body>
    <noscript>You need to enable JavaScript to run this app.</noscript>
    <div id="root"></div>
  </body>
</html>
